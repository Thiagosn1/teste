<section class="hero" id="about">
  <div class="hero-copy">
    <h1>{{ content.title }}</h1>
    <div class="hero-art-mobile" aria-hidden="true">
      <img
        class="hero-art-image"
        src="/images/illustration.svg"
        alt=""
        aria-hidden="true"
      />
    </div>
    <p>{{ content.description }}</p>
    <button type="button" class="btn btn-dark">{{ content.ctaLabel }}</button>
  </div>

  <div class="hero-art" aria-hidden="true">
    <img
      class="hero-art-image"
      src="/images/illustration.svg"
      alt=""
      aria-hidden="true"
    />
  </div>
</section>
